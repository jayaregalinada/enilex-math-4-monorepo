name: ✨ Feature request
description: Suggest an idea or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The motivation — what's missing or frustrating today?
      placeholder: As a teacher/learner, I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues/discussions and this isn't a duplicate.
          required: true
        - label: This idea keeps the project's no-personal-data-from-children policy intact.
          required: true
